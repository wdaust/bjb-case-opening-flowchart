<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Opening Task Tracker — Litify</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f1f5f9; }
  .section-toggle { cursor: pointer; user-select: none; }
  .section-toggle:hover { background: rgba(0,0,0,0.02); }
  .task-row { transition: background 0.15s ease; }
  .task-row:hover { background: rgba(0,0,0,0.02); }
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .check-done { text-decoration: line-through; color: #94a3b8; }
</style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header class="bg-gradient-to-r from-[#1e293b] to-[#334155] text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center font-bold text-lg">L</div>
      <div>
        <h1 class="text-lg font-bold leading-tight">Martinez v. Johnson Trucking</h1>
        <p class="text-slate-300 text-sm">Matter #2026-PI-00847 &middot; Full Case Opening Tracker</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="text-right">
        <div class="text-2xl font-bold" id="totalComplete">0</div>
        <div class="text-xs text-slate-300">of 53 tasks</div>
      </div>
      <div class="w-32 bg-white/20 rounded-full h-3">
        <div id="totalBar" class="bg-green-400 h-3 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>
    </div>
  </div>
</header>

<!-- Filters -->
<div class="max-w-6xl mx-auto px-4 py-3">
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 flex flex-wrap items-center gap-3">
    <span class="text-sm font-semibold text-slate-700">Filter:</span>

    <select id="filterPhase" onchange="applyFilters()" class="text-sm border border-slate-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="">All Phases</option>
      <option value="Client Orientation">Client Orientation</option>
      <option value="Case Setup">Case Setup</option>
      <option value="Automated Doc Request">Automated Doc Request</option>
      <option value="Doc Request">Doc Request</option>
      <option value="Review">Review</option>
      <option value="Doc Production">Doc Production</option>
      <option value="Approval">Approval</option>
      <option value="Filing">Filing</option>
      <option value="Service of Summons & Complaint">Service of Summons & Complaint</option>
      <option value="Court Notice">Court Notice</option>
      <option value="Follow Up">Follow Up</option>
      <option value="Supportive Doc Production">Supportive Doc Production</option>
      <option value="Court Filing Notice">Court Filing Notice</option>
    </select>

    <select id="filterAssignee" onchange="applyFilters()" class="text-sm border border-slate-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="">All Assignees</option>
      <option value="Legal Asst / Para">Legal Asst / Para</option>
      <option value="System Automation">System Automation</option>
      <option value="Attorney">Attorney</option>
      <option value="Paralegal">Paralegal</option>
      <option value="Paralegal/Legal Asst">Paralegal/Legal Asst</option>
      <option value="Paralegal Manager / Team Lead">Paralegal Mgr / Team Lead</option>
    </select>

    <select id="filterStatus" onchange="applyFilters()" class="text-sm border border-slate-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="">All Statuses</option>
      <option value="complete">Complete</option>
      <option value="pending">Pending</option>
    </select>

    <button onclick="resetFilters()" class="text-sm text-slate-500 hover:text-slate-700 ml-auto">Reset</button>
  </div>
</div>

<!-- Task Sections -->
<main class="max-w-6xl mx-auto px-4 pb-8" id="taskSections">
</main>

<!-- Navigation -->
<div class="max-w-6xl mx-auto px-4 pb-8">
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
    <h3 class="font-bold text-slate-800 mb-3">Mockup Navigation</h3>
    <div class="flex flex-wrap gap-2">
      <a href="client-contact.html" class="text-sm text-slate-600 hover:text-[#1565c0] hover:bg-blue-50 px-3 py-2 rounded transition">Client Contact</a>
      <a href="case-setup.html" class="text-sm text-slate-600 hover:text-[#1a237e] hover:bg-indigo-50 px-3 py-2 rounded transition">Case Setup Scoring</a>
      <span class="text-sm font-semibold text-slate-800 bg-slate-100 px-3 py-2 rounded">Full Task Tracker (current)</span>
    </div>
  </div>
</div>

  { id:"AJ", label:"Follow Up Request 3", assignedTo:"Legal Asst / Para", sla:"34 days from the submission request", phase:"Follow Up", style:"follow-up", fn:"Submit Litify chatter, mark complete" },
  { id:"AK", label:"Call/Chatter Attempt 1", assignedTo:"Paralegal Manager / Team Lead", sla:"42 days from the submission request", phase:"Follow Up", style:"follow-up", fn:"Call or Submit Litify chatter, mark complete" },
  { id:"AL", label:"Call/Chatter Attempt 2", assignedTo:"Paralegal Manager / Team Lead", sla:"52 days from the submission request", phase:"Follow Up", style:"follow-up", fn:"Call or Submit Litify chatter, mark complete" },
  { id:"AM", label:"Call/Chatter Attempt 3", assignedTo:"Paralegal Manager / Team Lead", sla:"62 days from the submission request", phase:"Follow Up", style:"follow-up", fn:"Call or Submit Litify chatter, mark complete" },
  { id:"AR", label:"Proof of service", assignedTo:"Paralegal", sla:"35 days from OA", phase:"Follow Up", style:"follow-up", fn:"Verify proof of service, mark complete" },
  { id:"AX", label:"Supportive Doc Production 1", assignedTo:"Legal Asst / Para", sla:"1 hour from Manager approval", phase:"Supportive Doc Production", style:"supportive-doc-production", fn:"Draft and process supportive doc production" },
  { id:"AY", label:"Supportive Doc Production 2", assignedTo:"Legal Asst / Para", sla:"3 hours from Manager approval", phase:"Supportive Doc Production", style:"supportive-doc-production", fn:"Draft and process supportive doc production" },
  { id:"AZ", label:"Supportive Doc Production 3", assignedTo:"Legal Asst / Para", sla:"5 hours from Manager approval", phase:"Supportive Doc Production", style:"supportive-doc-production", fn:"Draft and process supportive doc production" },

const phaseColors = {
  "client-orientation": { stroke: "#1565c0", fill: "#dbe7f5" },
  "case-setup": { stroke: "#1a237e", fill: "#dcdeeb" },
  "automated-doc-request": { stroke: "#2e7d32", fill: "#dfebe0" },
  "doc-request": { stroke: "#e65100", fill: "#fbe4d8" },
  "review": { stroke: "#6a1b9a", fill: "#e8dcef" },
  "doc-production": { stroke: "#e65100", fill: "#fbe4d8" },
  "approval": { stroke: "#6a1b9a", fill: "#e8dcef" },
  "filing": { stroke: "#c62828", fill: "#f6dede" },
  "service-of-summons-complaint": { stroke: "#00838f", fill: "#d8ecee" },
  "court-notice": { stroke: "#37474f", fill: "#e1e3e4" },
  "follow-up": { stroke: "#f9a825", fill: "#fef1de" },
  "supportive-doc-production": { stroke: "#ad1457", fill: "#f2dbe5" },
  "court-filing-notice": { stroke: "#37474f", fill: "#e1e3e4" },
};

const phaseOrder = [
  "Client Orientation","Case Setup","Automated Doc Request","Doc Request","Review",
  "Doc Production","Approval","Filing","Service of Summons & Complaint","Court Notice",
  "Follow Up","Supportive Doc Production","Court Filing Notice"
];

const completedTasks = new Set();
const collapsedSections = new Set();

function getPhaseStyle(style) {
  return phaseColors[style] || { stroke: "#64748b", fill: "#f1f5f9" };
}

function getSLABadge(task) {
  if (completedTasks.has(task.id)) return '<span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700">Complete</span>';
  if (task.sla === 'Automation') return '<span class="text-xs px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-600">Auto</span>';
  // Random SLA status for demo
  const rand = task.id.charCodeAt(0) % 3;
  if (rand === 0) return '<span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700">On Track</span>';
  if (rand === 1) return '<span class="text-xs px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-700">Due Soon</span>';
  return '<span class="text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-700">Overdue</span>';
}

function render() {
  const container = document.getElementById('taskSections');
  const filterPhase = document.getElementById('filterPhase').value;
  const filterAssignee = document.getElementById('filterAssignee').value;
  const filterStatus = document.getElementById('filterStatus').value;

  // Group tasks by phase
  const groups = {};
  phaseOrder.forEach(p => groups[p] = []);
  tasks.forEach(t => {
    if (filterPhase && t.phase !== filterPhase) return;
    if (filterAssignee && t.assignedTo !== filterAssignee) return;
    if (filterStatus === 'complete' && !completedTasks.has(t.id)) return;
    if (filterStatus === 'pending' && completedTasks.has(t.id)) return;
    if (!groups[t.phase]) groups[t.phase] = [];
    groups[t.phase].push(t);
  });

  let html = '';
  phaseOrder.forEach(phase => {
    const phaseTasks = groups[phase];
    if (!phaseTasks || !phaseTasks.length) return;

    const style = getPhaseStyle(phaseTasks[0].style);
    const isCollapsed = collapsedSections.has(phase);
    const doneCount = phaseTasks.filter(t => completedTasks.has(t.id)).length;

    html += '<div class="mb-4">';
    html += '<div class="section-toggle bg-white rounded-t-xl border border-slate-200 px-4 py-3 flex items-center justify-between" onclick="toggleSection(\'' + phase.replace(/'/g,"\\'") + '\')" style="border-left: 4px solid ' + style.stroke + '">';
    html += '<div class="flex items-center gap-3">';
    html += '<svg class="w-4 h-4 text-slate-400 transition-transform ' + (isCollapsed ? '' : 'rotate-90') + '" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>';
    html += '<span class="w-3 h-3 rounded-full" style="background:' + style.stroke + '"></span>';
    html += '<span class="font-bold text-slate-800">' + phase + '</span>';
    html += '<span class="text-xs text-slate-500">(' + phaseTasks.length + ' tasks)</span>';
    html += '</div>';
    html += '<div class="flex items-center gap-2">';
    html += '<span class="text-xs text-slate-500">' + doneCount + '/' + phaseTasks.length + '</span>';
    html += '<div class="w-16 bg-slate-200 rounded-full h-1.5"><div class="h-1.5 rounded-full" style="width:' + (phaseTasks.length ? doneCount/phaseTasks.length*100 : 0) + '%;background:' + style.stroke + '"></div></div>';
    html += '</div>';
    html += '</div>';

    if (!isCollapsed) {
      html += '<div class="bg-white border-x border-b border-slate-200 rounded-b-xl overflow-hidden">';
      phaseTasks.forEach(t => {
        const isDone = completedTasks.has(t.id);
        html += '<div class="task-row flex items-center gap-3 px-4 py-2.5 border-b border-slate-100 last:border-b-0" data-phase="' + t.phase + '" data-assignee="' + t.assignedTo + '">';
        html += '<input type="checkbox" ' + (isDone ? 'checked' : '') + ' onchange="toggleTask(\'' + t.id + '\')" class="w-4 h-4 rounded border-slate-300 text-green-600 focus:ring-green-500 cursor-pointer">';
        html += '<span class="text-xs font-mono font-bold w-8 text-center rounded px-1 py-0.5" style="background:' + style.fill + ';color:' + style.stroke + '">' + t.id + '</span>';
        html += '<div class="flex-1 min-w-0">';
        html += '<span class="text-sm font-medium ' + (isDone ? 'check-done' : 'text-slate-800') + '">' + t.label + '</span>';
        html += '</div>';
        html += '<span class="text-xs text-slate-500 hidden sm:inline whitespace-nowrap">' + t.assignedTo + '</span>';
        html += '<span class="text-xs text-slate-400 hidden md:inline whitespace-nowrap max-w-[180px] truncate" title="' + t.sla + '">' + t.sla + '</span>';
        html += getSLABadge(t);
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });

  container.innerHTML = html;
  updateProgress();
}

function toggleTask(id) {
  if (completedTasks.has(id)) completedTasks.delete(id);
  else completedTasks.add(id);
  render();
}

function toggleSection(phase) {
  if (collapsedSections.has(phase)) collapsedSections.delete(phase);
  else collapsedSections.add(phase);
  render();
}

function updateProgress() {
  const total = tasks.length;
  const done = completedTasks.size;
  document.getElementById('totalComplete').textContent = done;
  document.getElementById('totalBar').style.width = (done / total * 100) + '%';
}

function applyFilters() { render(); }

function resetFilters() {
  document.getElementById('filterPhase').value = '';
  document.getElementById('filterAssignee').value = '';
  document.getElementById('filterStatus').value = '';
  render();
}

// Initial render
render();
</script>

</body>
</html>
